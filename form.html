<!DOCTYPE html>
<html>
<head>
    <title>Complete Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        form {
            width: 350px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        label {
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }
        .inline {
            width: auto;
        }
        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid black;
            width: 350px;
        }
    </style>
</head>
<body>

<h2>Registration Form</h2>

<form id="myForm">
    <label>Full Name:</label>
    <input type="text" id="name" required>

    <label>Email:</label>
    <input type="email" id="email" required>

    <label>Password:</label>
    <input type="password" id="password" required>

    <label>Age:</label>
    <input type="number" id="age">

    <label>Date of Birth:</label>
    <input type="date" id="dob">

    <label>Gender:</label><br>
    <input type="radio" name="gender" value="Male" class="inline"> Male
    <input type="radio" name="gender" value="Female" class="inline"> Female
    <input type="radio" name="gender" value="Other" class="inline"> Other
    <br><br>

    <label>Hobbies:</label><br>
    <input type="checkbox" value="Reading" class="hobby inline"> Reading
    <input type="checkbox" value="Music" class="hobby inline"> Music
    <input type="checkbox" value="Sports" class="hobby inline"> Sports
    <br><br>

    <label>Country:</label>
    <select id="country">
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
        <option>Australia</option>
    </select>

    <label>Upload File:</label>
    <input type="file" id="file">

    <label>Address:</label>
    <textarea id="address"></textarea>

    <button type="button" onclick="printData()">Submit</button>
</form>

<div id="output">
    <h3>Submitted Data:</h3>
</div>

<script>
function printData() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let age = document.getElementById("age").value;
    let dob = document.getElementById("dob").value;
    let country = document.getElementById("country").value;
    let address = document.getElementById("address").value;

    // Gender
    let gender = document.querySelector('input[name="gender"]:checked');
    gender = gender ? gender.value : "Not selected";

    // Hobbies
    let hobbies = document.querySelectorAll(".hobby:checked");
    let hobbyList = [];
    hobbies.forEach(function(hobby) {
        hobbyList.push(hobby.value);
    });

    // File
    let file = document.getElementById("file").files[0];
    let fileName = file ? file.name : "No file uploaded";

    document.getElementById("output").innerHTML =
        "<h3>Submitted Data:</h3>" +
        "Name: " + name + "<br>" +
        "Email: " + email + "<br>" +
        "Password: " + password + "<br>" +
        "Age: " + age + "<br>" +
        "DOB: " + dob + "<br>" +
        "Gender: " + gender + "<br>" +
        "Hobbies: " + hobbyList.join(", ") + "<br>" +
        "Country: " + country + "<br>" +
        "File: " + fileName + "<br>" +
        "Address: " + address;
}
</script>

</body>
</html>
