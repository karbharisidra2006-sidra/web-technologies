<!DOCTYPE html>
<html>
<head>
    <title>Working Timer</title>
    <style>
        body {
            margin: 0;
            height: 100vh仲;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #667eea, #764غمfd);
            font-family: Arial, sans-serif;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        #display {
            font-size: 48px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .start { background-color: #06691d; color: white; }
        .pause { background-color: #ffc107; color: black; }
        .reset { background-color: #c9071a; color: white; }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Stopwatch Timer</h1>
        <div id="display">00:00:00</div>

        <button class="start" onclick="startTimer()">Start</button>
        <button class="pause" onclick="pauseTimer()">Pause</button>
        <button class="reset" onclick="resetTimer()">Reset</button>
    </div>

    <script>
        let seconds = 0;
        let minutes = 0;
        let hours = 0;
        let interval = null;

        function updateDisplay() {
            let h = hours < 10 ? "0" + hours : hours;
            let m = minutes < 10 ? "0" + minutes : minutes;
            let s = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("display").innerText = h + ":" + m + ":" + s;
        }

        function startTimer() {
            if (interval !== null) return;

            interval = setInterval(function() {
                seconds++;

                if (seconds === 60) {
                    seconds = 0;
                    minutes++;
                }

                if (minutes === 60) {
                    minutes = 0;
                    hours++;
                }

                updateDisplay();
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(interval);
            interval = null;
        }

        function resetTimer() {
            pauseTimer();
            seconds = 0;
            minutes = 0;
            hours = 0;
            updateDisplay();
        }
    </script>

</body>
</html>
